<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时日志 - OpenAI 注册系统</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">
                <h1>OpenAI 注册系统</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">注册</a>
                <a href="/accounts" class="nav-link">账号管理</a>
                <a href="/email-services" class="nav-link">邮箱服务</a>
                <a href="/payment" class="nav-link">支付</a>
                <a href="/settings" class="nav-link">设置</a>
                <a href="/logs" class="nav-link active">实时日志</a>
                <a href="/logout" class="nav-link">退出</a>
            </div>
            <button class="theme-toggle" onclick="theme.toggle()" title="切换主题">🌙</button>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h2>实时日志</h2>
                <p class="subtitle">实时查看系统运行情况，重点盯住 CPA 自动补号、注册批次和错误告警</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>系统日志窗口</h3>
                    <span id="log-stream-status" class="status-badge active">实时中</span>
                </div>
                <div class="card-body">
                    <div class="log-toolbar">
                        <div class="log-toolbar-row">
                            <div class="form-group log-field">
                                <label for="log-level">日志级别</label>
                                <select id="log-level">
                                    <option value="ALL">全部</option>
                                    <option value="INFO">INFO</option>
                                    <option value="WARNING">WARNING</option>
                                    <option value="ERROR">ERROR</option>
                                    <option value="DEBUG">DEBUG</option>
                                </select>
                            </div>
                            <div class="form-group log-field log-field-wide">
                                <label for="log-keyword">关键字过滤</label>
                                <input
                                    type="text"
                                    id="log-keyword"
                                    placeholder="留空查看全部，可输入 CPA Auto Refill、任务 ID、邮箱等关键字"
                                >
                            </div>
                            <div class="form-group log-field log-field-sm">
                                <label for="log-lines">初始加载行数</label>
                                <select id="log-lines">
                                    <option value="100">100 行</option>
                                    <option value="200" selected>200 行</option>
                                    <option value="500">500 行</option>
                                </select>
                            </div>
                        </div>

                        <div class="log-toolbar-row log-toolbar-actions">
                            <div class="log-action-group">
                                <button id="apply-filter-btn" class="btn btn-primary">应用过滤</button>
                                <button id="refresh-log-btn" class="btn btn-secondary">立即刷新</button>
                                <button id="cpa-filter-btn" class="btn btn-ghost">只看 CPA 自动补号</button>
                                <button id="pause-log-btn" class="btn btn-ghost">暂停滚动</button>
                                <button id="clear-log-view-btn" class="btn btn-ghost btn-sm">清空窗口</button>
                            </div>
                            <div class="log-action-group">
                                <label class="checkbox-inline">
                                    <input type="checkbox" id="auto-scroll-toggle" checked>
                                    自动滚动到底部
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="log-meta">
                        <span>日志文件: <code id="log-file-path">读取中...</code></span>
                        <span>匹配行数: <strong id="log-total-lines">0</strong></span>
                        <span>最近刷新: <strong id="log-last-updated">未开始</strong></span>
                    </div>

                    <div id="system-log-viewer" class="console-log system-log-viewer">
                        <div class="log-line info">[系统] 正在连接日志流...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/logs.js?v={{ static_version }}"></script>
</body>
</html>
